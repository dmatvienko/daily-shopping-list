<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shopping List</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Shopping" />
  <link rel="apple-touch-icon" href="icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --white: #ffffff;
      --ink: #2d2416;
      --brown: #8b7355;
      --brown-light: #b8a88a;
      --border: #e8ddd0;
      --border-input: #d4c4a8;
      --muted: #c4b49a;
      --hover-bg: #f0e8d8;
      --red: #8b3a3a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Fraunces', Georgia, serif;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 100px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* Header */
    .header { width: 100%; margin-bottom: 24px; }

    .title {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--brown-light);
      letter-spacing: 0.06em;
    }

    /* Tabs */
    .tabs {
      width: 100%;
      display: flex;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1.5px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .tab-btn:not(.active):active {
      color: var(--brown);
    }

    /* Input */
    .input-row {
      width: 100%;
      display: flex;
      align-items: stretch;
      background: var(--white);
      border-radius: 6px;
      border: 1.5px solid var(--border-input);
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--brown);
      box-shadow: 0 0 0 3px rgba(139,115,85,0.12);
    }

    .text-input {
      flex: 1;
      padding: 16px 16px;
      font-size: 18px;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      min-width: 0;
    }

    .text-input::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .add-btn {
      padding: 16px 20px;
      background: var(--ink);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:active { background: #000; }

    /* List */
    .list { width: 100%; }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:last-child { border-bottom: none; }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      background: transparent;
      transition: all 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .check:active { transform: scale(0.9); }
    .check.checked { background: var(--brown); border-color: var(--brown); }

    .checkmark {
      width: 11px;
      height: 11px;
      stroke: var(--bg);
      stroke-width: 2.5;
      fill: none;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .check.checked .checkmark { opacity: 1; }

    .item-text {
      flex: 1;
      font-size: 19px;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.3;
      word-break: break-word;
    }

    .item-text.done {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--border-input);
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--muted);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      opacity: 0.4;
      transition: color 0.15s, opacity 0.15s;
    }

    .del-btn:active { color: var(--red); opacity: 1; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown-light);
      padding: 24px 0 8px;
    }

    .clear-row {
      text-align: center;
      padding-top: 20px;
    }

    .clear-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--brown-light);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 8px;
    }

    .clear-btn:active { color: var(--red); }

    .empty {
      font-size: 17px;
      font-style: italic;
      color: var(--muted);
      font-weight: 300;
      padding: 16px 0;
    }

    /* Tab panels */
    .tab-panel { display: none; width: 100%; }
    .tab-panel.active { display: contents; }

    /* Export/Import */
    .data-row {
      width: 100%;
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    .data-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--brown-light);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 8px 12px;
    }

    .data-btn:active { color: var(--brown); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45,36,22,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: 10px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    .modal-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 16px;
    }

    .modal textarea {
      width: 100%;
      height: 140px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink);
      background: var(--white);
      border: 1.5px solid var(--border-input);
      border-radius: 6px;
      padding: 12px;
      resize: none;
      outline: none;
    }

    .modal textarea:focus { border-color: var(--brown); }

    .modal-hint {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      justify-content: flex-end;
    }

    .modal-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-btn.primary { background: var(--ink); color: var(--bg); }
    .modal-btn.primary:active { background: #000; }
    .modal-btn.secondary { background: var(--border); color: var(--brown); }
    .modal-btn.secondary:active { background: var(--border-input); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title" id="header-title">Shopping List</div>
      <div class="subtitle" id="subtitle">empty — add something</div>
      <div id="sync-indicator" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--brown-light);letter-spacing:0.08em;margin-top:4px;opacity:0;transition:opacity 0.3s;">✓ synced</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-shopping" onclick="switchTab('shopping')">Shopping</button>
      <button class="tab-btn" id="tab-todo" onclick="switchTab('todo')">To-Do</button>
    </div>

    <!-- Shopping panel -->
    <div class="tab-panel active" id="panel-shopping">
      <div class="input-row">
        <input
          id="input-shopping"
          class="text-input"
          type="text"
          placeholder="What do you need?"
          autocomplete="off"
          autocorrect="off"
          enterkeyhint="done"
        />
        <button class="add-btn" id="add-btn-shopping">Add</button>
      </div>
      <div class="list" id="list-shopping"></div>
    </div>

    <!-- To-Do panel -->
    <div class="tab-panel" id="panel-todo">
      <div class="input-row">
        <input
          id="input-todo"
          class="text-input"
          type="text"
          placeholder="What needs doing?"
          autocomplete="off"
          autocorrect="off"
          enterkeyhint="done"
        />
        <button class="add-btn" id="add-btn-todo">Add</button>
      </div>
      <div class="list" id="list-todo"></div>
    </div>

    <!-- Export/Import row -->
    <div class="data-row">
      <button class="data-btn" onclick="openExport()">export data</button>
      <button class="data-btn" onclick="openImport()">import data</button>
    </div>
  </div>

  <!-- Export modal -->
  <div class="modal-overlay" id="modal-export">
    <div class="modal">
      <div class="modal-title">Export your data</div>
      <textarea id="export-text" readonly onclick="this.select()"></textarea>
      <div class="modal-hint">Select all and copy this text, then paste it on your other device using Import data.</div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal('modal-export')">Close</button>
        <button class="modal-btn primary" onclick="copyExport()">Copy</button>
      </div>
    </div>
  </div>

  <!-- Import modal -->
  <div class="modal-overlay" id="modal-import">
    <div class="modal">
      <div class="modal-title">Import data</div>
      <textarea id="import-text" placeholder="Paste your exported data here…"></textarea>
      <div class="modal-hint">This will merge imported items with your existing list.</div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeModal('modal-import')">Cancel</button>
        <button class="modal-btn primary" onclick="doImport()">Import</button>
      </div>
    </div>
  </div>

  <script>
    const TITLES = {
      shopping: 'Shopping List',
      todo: 'To-Do'
    };

    let state = {
      shopping: [],
      todo: []
    };

    let activeTab = 'shopping';

    // ── Cloud sync (via Netlify function → GitHub Gist) ──────
    const SYNC_URL  = '/.netlify/functions/sync';
    const CACHE_KEY = 'gist-cache-v1';

    let saveTimer = null;
    let syncStatus = 'idle'; // idle | saving | error

    function setSyncIndicator(status) {
      syncStatus = status;
      const el = document.getElementById('sync-indicator');
      if (!el) return;
      el.textContent = status === 'saving' ? '↑ saving…' : status === 'error' ? '⚠ offline' : '✓ synced';
      el.style.opacity = status === 'idle' ? '0' : '1';
      if (status === 'idle') return;
      clearTimeout(el._hideTimer);
      if (status !== 'saving') el._hideTimer = setTimeout(() => el.style.opacity = '0', 2000);
    }

    async function loadFromCloud() {
      try {
        const r = await fetch(SYNC_URL, { cache: 'no-store' });
        if (!r.ok) throw new Error(r.status);
        const cloudData = await r.json();

        const cloudHasItems = cloudData.shopping?.length > 0 || cloudData.todo?.length > 0;

        if (!cloudHasItems) {
          // Cloud is empty — check if we have unsaved local data to recover
          try {
            const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
            if (cached?.shopping?.length > 0 || cached?.todo?.length > 0) {
              state.shopping = cached.shopping || [];
              state.todo     = cached.todo     || [];
              await saveToCloud(); // push local data up to cloud
              return true;
            }
          } catch {}
        }

        state.shopping = cloudData.shopping || [];
        state.todo     = cloudData.todo     || [];
        localStorage.setItem(CACHE_KEY, JSON.stringify(state));
        return true;
      } catch {
        // Fall back to local cache
        try {
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
          if (cached) { state.shopping = cached.shopping || []; state.todo = cached.todo || []; }
        } catch {}
        setSyncIndicator('error');
        return false;
      }
    }

    async function saveToCloud() {
      setSyncIndicator('saving');
      const payload = { shopping: state.shopping, todo: state.todo };
      localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
      try {
        const r = await fetch(SYNC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!r.ok) throw new Error(r.status);
        setSyncIndicator('idle');
      } catch {
        setSyncIndicator('error');
      }
    }

    function save() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveToCloud, 800);
    }

    // ── Tabs ─────────────────────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;

      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');

      // Update panels
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');

      // Update header title
      document.getElementById('header-title').textContent = TITLES[tab];

      render(tab);

      // Focus input on desktop
      if (window.innerWidth > 600) {
        document.getElementById('input-' + tab).focus();
      }
    }

    // ── CRUD ─────────────────────────────────────────────────
    function add(tab) {
      const input = document.getElementById('input-' + tab);
      const raw = input.value.trim();
      if (!raw) return;

      const texts = raw
        .split(/[,\n;]+/)
        .map(t => t.trim())
        .filter(t => t.length > 0);

      if (texts.length === 0) return;

      const now = Date.now();
      const newItems = texts.map((text, i) => ({ id: now + i, text, done: false }));
      state[tab] = [...newItems, ...state[tab]];

      input.value = '';
      save();
      render(tab);
    }

    function toggle(tab, id) {
      state[tab] = state[tab].map(i => i.id === id ? { ...i, done: !i.done } : i);
      save();
      render(tab);
    }

    function remove(tab, id) {
      state[tab] = state[tab].filter(i => i.id !== id);
      save();
      render(tab);
    }

    function clearDone(tab) {
      state[tab] = state[tab].filter(i => !i.done);
      save();
      render(tab);
    }

    // ── Render ────────────────────────────────────────────────
    function render(tab) {
      const items = state[tab];
      const pending = items.filter(i => !i.done);
      const done = items.filter(i => i.done);
      const listEl = document.getElementById('list-' + tab);

      // Update subtitle only for active tab
      if (tab === activeTab) {
        const subtitle = document.getElementById('subtitle');
        if (items.length === 0) {
          subtitle.textContent = 'empty — add something';
        } else {
          subtitle.textContent = `${pending.length} remaining${done.length > 0 ? ` · ${done.length} done` : ''}`;
        }
      }

      let html = '';
      if (items.length === 0) {
        html = '<div class="empty">Your list is empty.</div>';
      }

      pending.forEach(item => { html += itemHTML(tab, item); });

      if (done.length > 0) {
        html += `<div class="section-label">Done</div>`;
        done.forEach(item => { html += itemHTML(tab, item); });
        html += `<div class="clear-row"><button class="clear-btn" onclick="clearDone('${tab}')">clear ${done.length} done item${done.length !== 1 ? 's' : ''}</button></div>`;
      }

      listEl.innerHTML = html;
    }

    function itemHTML(tab, item) {
      return `
        <div class="item">
          <button class="check ${item.done ? 'checked' : ''}" onclick="toggle('${tab}', ${item.id})">
            <svg viewBox="0 0 12 12" class="checkmark">
              <polyline points="1.5,6 4.5,9.5 10.5,2.5"/>
            </svg>
          </button>
          <span class="item-text ${item.done ? 'done' : ''}">${escHtml(item.text)}</span>
          <button class="del-btn" onclick="remove('${tab}', ${item.id})">
            <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
            </svg>
          </button>
        </div>`;
    }

    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ──────────────────────────────────────────────────
    async function init() {
      // Wire up shopping
      document.getElementById('add-btn-shopping').addEventListener('click', () => add('shopping'));
      document.getElementById('input-shopping').addEventListener('keydown', e => {
        if (e.key === 'Enter') add('shopping');
      });

      // Wire up todo
      document.getElementById('add-btn-todo').addEventListener('click', () => add('todo'));
      document.getElementById('input-todo').addEventListener('keydown', e => {
        if (e.key === 'Enter') add('todo');
      });

      // Load from cloud (falls back to local cache if offline)
      await loadFromCloud();

      render('shopping');
      render('todo');

      if (window.innerWidth > 600) {
        document.getElementById('input-shopping').focus();
      }

      // Service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    }

    window.addEventListener('load', init);

    // ── Export / Import ───────────────────────────────────────
    function openExport() {
      const payload = JSON.stringify({ shopping: state.shopping, todo: state.todo });
      document.getElementById('export-text').value = payload;
      document.getElementById('modal-export').classList.add('open');
    }

    function copyExport() {
      const ta = document.getElementById('export-text');
      ta.select();
      navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
      const btn = document.querySelector('#modal-export .modal-btn.primary');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    }

    function openImport() {
      document.getElementById('import-text').value = '';
      document.getElementById('modal-import').classList.add('open');
    }

    function doImport() {
      const raw = document.getElementById('import-text').value.trim();
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        // Support both full export {shopping, todo} and bare array (old format)
        const incoming = {
          shopping: Array.isArray(data) ? data : (data.shopping || []),
          todo: Array.isArray(data) ? [] : (data.todo || [])
        };
        // Merge: add items whose text doesn't already exist
        ['shopping', 'todo'].forEach(tab => {
          const existingTexts = new Set(state[tab].map(i => i.text.toLowerCase()));
          const newItems = incoming[tab].filter(i => !existingTexts.has(i.text.toLowerCase()));
          state[tab] = [...newItems, ...state[tab]];
          save(tab);
        });
        closeModal('modal-import');
        render(activeTab);
      } catch {
        alert('Invalid data — make sure you pasted the full export text.');
      }
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });
  </script>
</body>
</html>
